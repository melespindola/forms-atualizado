<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios Inteligentes</title>
    <link rel="stylesheet" href="../estilo/style.css">

</head>
<body>
    <form id="form-inscricao">
        <label>Nome:</label>
        <input type="text" id="nome">
        <br>

        <label>Idade:</label>
        <input type="number" id="idade">
        <br>

        <label> Nivel de Experiencia (1 a 10):</label>
        <input type="number" id="nivel">
        <br>   

        <button type="button" onclick="validar()">Enviar</button>
    </form>
    <p id="mensagem"></p>

    <!--DESAFIO 1-->
    <form>
        <h2>Desafio 1</h2>

        <label>Senha:</label>
        <input type="password" id="senha1">
        <br>

        <label>Confirmar Senha:</label>
        <input type="password" id="senha2">
        <br>

        <button type="button" onclick="validarSenha()">Validar Senha</button>
        <p id="msgSenha"></p>
    </form>

    <hr>

    <!-- DESAFIO 2 -->
    <form>
        <h2>Desafio 2 </h2>

        <label>Idade:</label>
        <input type="number" id="idadePromo">
        <br>

        <label>É estudante?</label>
        <select id="estudante">
            <option value="nao">Não</option>
            <option value="sim">Sim</option>
        </select>
        <br>

        <button type="button" onclick="verificarDesconto()">Verificar Desconto</button>
        <p id="msgPromo"></p>
    </form>

    <hr>

    <!-- DESAFIO 3 -->
    <form>
        <h2>Desafio 3 </h2>

        <label>Nome:</label>
        <input type="text" id="nome">
        <br>

        <label>Idade:</label>
        <input type="number" id="idade">
        <br>

        <button type="button" onclick="verificarBouncer()">Entrar</button>
        <p id="msgBouncer"></p>
    </form>

    <script src="/scripts/scripts.js"></script>

</body>
</html>
